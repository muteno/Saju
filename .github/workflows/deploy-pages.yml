name: deploy-pages

# main 재빌드 → Cloudflare Pages(saju02) 자동 배포 (Q.25).
# 배경: 배포는 그동안 Cloudflare 대시보드 Git 연동에만 의존 → 재빌드가 트리거되지 않아
#   main 머지 후에도 라이브(saju02·soong.kr)가 옛 번들을 서빙하는 사고 발생(260722 실측).
# 이 워크플로가 push마다 확정 빌드+배포해 그 경로를 대체한다(대시보드 연동과 병존 무해).
# CLOUDFLARE_API_TOKEN 시크릿이 없으면 '빌드만' 하고 배포는 스킵(exit 0 = 빨간 X 없음) —
#   시크릿 등록 즉시 다음 push부터 자동 배포. 시크릿 값은 러너 안에서만 산다(로그 노출 금지).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 루트 build = prebuild(python 파생물+엔진 sync+kb 번들) → app tsc+vite → dist/
      - name: Build (dist/)
        run: npm run build

      - name: Deploy to Cloudflare Pages (saju02)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN 시크릿이 없어 배포를 건너뜀(빌드는 성공). 레포 Settings→Secrets and variables→Actions에 CLOUDFLARE_API_TOKEN(‘Cloudflare Pages: Edit’ 권한 토큰)을, 계정이 여럿이면 CLOUDFLARE_ACCOUNT_ID도 등록하면 다음 push부터 자동 배포됩니다."
            exit 0
          fi
          npx --yes wrangler@3 pages deploy dist --project-name=saju02 --branch=main
